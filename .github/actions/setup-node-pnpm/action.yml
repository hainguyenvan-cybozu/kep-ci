name: Setup Node and pnpm
description: Install Node.js and pnpm with the versions KEP repos use. Edit defaults here to bump every workflow at once.

inputs:
  node-version:
    description: Node.js version.
    required: false
    default: "24.14.1"
  pnpm-version:
    description: pnpm version.
    required: false
    default: "10.28.0"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}
